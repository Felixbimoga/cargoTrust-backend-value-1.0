spring:
  application:
    name: cargotrust-backend
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cargotrust_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    # Redis désactivé pour l'instant - utilisation MySQL local uniquement
    # redis:
    #   host: ${REDIS_HOST:localhost}
    #   port: ${REDIS_PORT:6379}

  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:8100}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:cargotrust237@gmail.com}
    password: ${MAIL_PASSWORD:qvbp cjdy wfqq flll}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  google:
    client-id-web: ${GOOGLE_CLIENT_ID_WEB:}
    client-secret-web: ${GOOGLE_CLIENT_SECRET_WEB:}
    client-id-android: ${GOOGLE_CLIENT_ID_ANDROID:}

  super-admin:
    email: ${SUPER_ADMIN_EMAIL:cargotrust237@gmail.com}
    password: ${SUPER_ADMIN_PASSWORD:Admin.123}

  storage:
    strategy: local
    local:
      base-path: ./uploads
      base-url: http://localhost:8081/cargo-trust-api/uploads

  security:
    jwt:
      secret: ${JWT_SECRET:default-dev-secret-key-minimum-256bits-padding-here-ok}
      access-token-expiration: 900000
      refresh-token-expiration: 2592000000
    otp:
      expiration-minutes: 10
    password-reset:
      expiration-hours: 1

server:
  address: 0.0.0.0
  port: 8081
  servlet:
    context-path: /cargo-trust-api
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
